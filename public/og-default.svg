<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- Left accent -->
  <rect x="0" y="0" width="6" height="630" fill="#0ea5e9"/>
  <!-- Bottom accent -->
  <rect x="0" y="610" width="1200" height="20" fill="#f0f9ff"/>

  <!-- Logo mark (three bars) -->
  <rect x="80" y="195" width="100" height="26" rx="5" fill="#0ea5e9"/>
  <rect x="97"  y="233" width="66"  height="26" rx="5" fill="#0ea5e9"/>
  <rect x="114" y="271" width="32"  height="26" rx="5" fill="#0ea5e9"/>

  <!-- Wordmark -->
  <text x="206" y="238"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="64" font-weight="800" fill="#0f172a" letter-spacing="3">DAPARAPARA</text>

  <!-- Tagline -->
  <text x="207" y="278"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18" font-weight="400" fill="#94a3b8" letter-spacing="3">DEEP MINING · DEEP LEARNING · DEEP VALUE</text>

  <!-- Divider -->
  <rect x="80" y="326" width="1040" height="1" fill="#e2e8f0"/>

  <!-- Why statement -->
  <text x="80" y="390"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="32" font-weight="300" fill="#475569">For the ones I love.</text>
  <text x="80" y="450"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="24" font-weight="300" fill="#94a3b8">Creating value that lasts, even when I am not there.</text>

  <!-- Site URL -->
  <text x="80" y="575"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18" fill="#cbd5e1">daparapara.com</text>
</svg>
