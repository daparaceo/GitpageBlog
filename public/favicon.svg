<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="daparapara">
  <!-- Sky blue background -->
  <rect width="32" height="32" rx="7" fill="#0ea5e9"/>
  <!-- 3 vertical bars, white, center-aligned at y=16 -->
  <!-- Bar 1: height 20 -->
  <rect x="6"  y="6"  width="5" height="20" rx="2.5" fill="white"/>
  <!-- Bar 2: height 13 -->
  <rect x="14" y="9.5" width="5" height="13" rx="2.5" fill="white"/>
  <!-- Bar 3: height 7 -->
  <rect x="22" y="12.5" width="5" height="7"  rx="2.5" fill="white"/>
</svg>
